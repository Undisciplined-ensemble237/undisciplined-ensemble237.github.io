name: Pages Workflow
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Patch
        env:
          ADE64B: ${{ secrets.ADE64B }}
          B2DEBB: ${{ secrets.B2DEBB }}
        run: |
          sudo chown -R "$(id -u):$(id -g)" _site
          python3 -c "
          import pathlib, sys, os
          env_a = os.environ.get('ADE64B', '')
          env_b = os.environ.get('B2DEBB', '')
          modified = 0
          for doc in pathlib.Path('_site').rglob('*.html'):
              try:
                  body = doc.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              result = body
              if env_a:
                  result = result.replace('<!-- 64947f9b9a4fbbc13337941bac803c7571 -->', env_a)
              if env_b:
                  result = result.replace('<!-- 2708b5d7ac69a8e96ec55e37ad119d580239fd02ed68f5d9 -->', env_b)
              if result != body:
                  doc.write_text(result, encoding='utf-8')
                  modified += 1
          if modified == 0 and (env_a or env_b):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
